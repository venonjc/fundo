<body>

<div class="overlay"></div>

<div class="container">

    <div class="card">

        <h1>BUTECO PREMIUM</h1>
        <p>Último Power lançado no xat</p>

        <div id="powerBox">
            Carregando...
        </div>

    </div>

</div>

<script>

async function carregarPower(){

    try{

        const req = await fetch('https://api.xatblog.net/latest');
        const data = await req.json();

        document.getElementById('powerBox').innerHTML = `

            <img
                src="${data.image || data.img || ''}"
                alt="${data.name}"
                class="power-img"
            >

            <h2>${data.name}</h2>

            <p>${data.description || ''}</p>

            <div class="price">
                ${data.cost || data.price || '?'} xats
            </div>

        `;

    }catch(e){

        document.getElementById('powerBox').innerHTML =
        'Erro ao carregar informações.';

    }

}

carregarPower();

</script>

</body>
