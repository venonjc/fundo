<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Buteco Premium XatsFrame</title>

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    min-height:100vh;
    font-family:'Segoe UI',sans-serif;
    background:url('https://xatimg.com/image/EfoTbkB34Hg4.png') center center/cover no-repeat fixed;
}

.overlay{
    position:fixed;
    inset:0;
    background:rgba(0,0,0,.45);
}

.container{
    position:relative;
    z-index:2;
    min-height:100vh;

    display:flex;
    justify-content:flex-end;
    align-items:flex-start;

    padding:20px;
}

.sidebar{
    width:430px;
    display:flex;
    flex-direction:column;
    gap:15px;
}

.box{
    background:rgba(0,0,0,.72);
    backdrop-filter:blur(10px);

    border-radius:20px;
    padding:18px;

    color:white;

    border:1px solid rgba(255,255,255,.1);
}

.box h2{
    color:#FFD700;
    margin-bottom:15px;
    font-size:20px;
}

.power-image{
    width:140px;
    height:140px;
    object-fit:contain;

    display:block;
    margin:auto;
}

.power-name{
    text-align:center;
    font-size:24px;
    font-weight:bold;
    margin-top:10px;
    color:#FFD700;
}

.power-desc{
    margin-top:10px;
    text-align:center;
    line-height:1.5;
}

.price{
    margin-top:15px;
    text-align:center;

    font-size:24px;
    font-weight:bold;

    color:#FFD700;
}

.promoted-item{
    padding:10px;
    margin-bottom:8px;

    background:rgba(255,255,255,.08);

    border-radius:10px;
}

input{
    width:100%;
    padding:12px;

    border:none;
    outline:none;

    border-radius:10px;

    margin-bottom:10px;
}

button{
    width:100%;
    padding:12px;

    border:none;
    border-radius:10px;

    cursor:pointer;

    font-weight:bold;
    font-size:15px;

    background:#FFD700;
}

.power-result{
    margin-top:10px;
    padding:10px;

    background:rgba(255,255,255,.08);
    border-radius:10px;

    display:flex;
    align-items:center;
    gap:10px;
}

.power-result img{
    width:60px;
    height:60px;
    object-fit:contain;
}

.loading{
    text-align:center;
    padding:15px;
}

@media(max-width:768px){

    .container{
        justify-content:center;
    }

    .sidebar{
        width:100%;
        max-width:430px;
    }

}

</style>
</head>

<body>

<div class="overlay"></div>

<div class="container">

    <div class="sidebar">

        <div class="box">

            <h2>🆕 Novo Power</h2>

            <div id="latestPower" class="loading">
                Carregando...
            </div>

        </div>

        <div class="box">

            <h2>📢 Chats Promovidos</h2>

            <div id="promotedChats" class="loading">
                Carregando...
            </div>

        </div>

        <div class="box">

            <h2>⚡ Buscar Código de Powers</h2>

            <input
                type="text"
                id="powerCode"
                placeholder="blowkiss#y#aqbubbles">

            <button onclick="buscarPower()">
                Buscar Power
            </button>

            <div id="powerInfo"></div>

        </div>

    </div>

</div>

<script>

async function carregarLatest(){

    try{

        const req =
        await fetch(
            "https://api.xatblog.net/latest"
        );

        const data =
        await req.json();

        const img =
            data.image ||
            data.icon ||
            data.img ||
            data.thumb ||
            "";

        const valor =
            data.cost ||
            data.price ||
            data.value ||
            "?";

        document.getElementById(
            "latestPower"
        ).innerHTML = `

            ${img ?
            `<img
            src="${img}"
            class="power-image">`
            : ''}

            <div class="power-name">
                ${data.name || 'Novo Power'}
            </div>

            <div class="power-desc">
                ${data.description || ''}
            </div>

            <div class="price">
                ${valor} xats
            </div>

        `;

    }catch(error){

        document.getElementById(
            "latestPower"
        ).innerHTML =
        "Erro ao carregar Power.";

    }

}

async function carregarPromoted(){

    try{

        const req =
        await fetch(
            "https://api.xatblog.net/promoted"
        );

        const data =
        await req.json();

        let html='';

        if(Array.isArray(data)){

            data.forEach(chat=>{

                html += `

                <div class="promoted-item">

                    ${chat.name ||
                      chat.chat ||
                      'Chat Promovido'}

                </div>

                `;

            });

        }

        document.getElementById(
            "promotedChats"
        ).innerHTML = html || "Nenhum chat.";

    }catch(error){

        document.getElementById(
            "promotedChats"
        ).innerHTML =
        "Erro ao carregar.";

    }

}

async function buscarPower(){

    const codigo =
    document.getElementById(
        "powerCode"
    ).value.trim();

    if(!codigo) return;

    try{

        const req =
        await fetch(
            "https://api.xatblog.net/powers/findpowers?code="
            + encodeURIComponent(codigo)
        );

        const data =
        await req.json();

        let html='';

        if(Array.isArray(data)){

            data.forEach(power=>{

                html += `

                <div class="power-result">

                    <img
                    src="${
                        power.image ||
                        power.icon ||
                        ''
                    }">

                    <div>

                        <strong>
                            ${
                                power.name ||
                                'Power'
                            }
                        </strong>

                    </div>

                </div>

                `;

            });

        }

        document.getElementById(
            "powerInfo"
        ).innerHTML =
        html || "Nenhum power encontrado.";

    }catch(error){

        document.getElementById(
            "powerInfo"
        ).innerHTML =
        "Erro na consulta.";

    }

}

carregarLatest();
carregarPromoted();

setInterval(
    carregarLatest,
    300000
);

setInterval(
    carregarPromoted,
    300000
);

</script>

</body>
</html>
