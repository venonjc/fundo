<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Buteco Premium - Xat Power Tracker</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    min-height:100vh;
    display:flex;
    justify-content:flex-end;
    align-items:center;
    padding:30px;
    font-family:Segoe UI,Arial,sans-serif;
    background:url('https://xatimg.com/image/EfoTbkB34Hg4.png') center center/cover no-repeat fixed;
}

body::before{
    content:'';
    position:fixed;
    inset:0;
    background:rgba(0,0,0,.55);
}

.card{
    position:relative;
    z-index:2;
    width:480px;
    background:rgba(0,0,0,.78);
    backdrop-filter:blur(12px);
    border-radius:22px;
    border:1px solid rgba(255,255,255,.12);
    padding:25px;
    color:#FFF;
    box-shadow:0 20px 50px rgba(0,0,0,.5);
}

.logo{
    text-align:center;
    font-size:32px;
    font-weight:bold;
    color:#FFD700;
    margin-bottom:20px;
}

.power-img{
    width:220px;
    height:220px;
    object-fit:contain;
    display:block;
    margin:auto;
}

.power-name{
    text-align:center;
    color:#FFD700;
    font-size:34px;
    font-weight:bold;
    margin-top:15px;
    text-transform:uppercase;
}

.power-desc{
    text-align:center;
    margin-top:15px;
    line-height:1.6;
}

.price{
    text-align:center;
    color:#FFD700;
    font-size:28px;
    font-weight:bold;
    margin-top:15px;
}

.release,
.status{
    text-align:center;
    margin-top:8px;
}

.status{
    color:#7CFF7C;
    font-weight:bold;
}

.countdown{
    text-align:center;
    color:#00D9FF;
    font-size:28px;
    font-weight:bold;
    margin-top:20px;
}

.footer{
    text-align:center;
    margin-top:20px;
    opacity:.7;
    font-size:12px;
}

@media(max-width:768px){
    body{
        justify-content:center;
        padding:15px;
    }

    .card{
        width:100%;
        max-width:480px;
    }
}
</style>
</head>
<body>

<div class="card">

    <div class="logo">
        BUTECO PREMIUM
    </div>

    <div id="conteudo">
        Carregando...
    </div>

    <div class="footer">
        Powered by XatBlog API
    </div>

</div>

<script>

let tempoRestante = 0;

async function carregarDados(){

    try{

        const [latestReq,countReq] = await Promise.all([
            fetch('https://api.xatblog.net/latest'),
            fetch('https://api.xatblog.net/countdown')
        ]);

        const latest = await latestReq.json();
        const countdown = await countReq.json();

        const power = latest.powers[0];

        tempoRestante = countdown.remaining_int || 0;

        const imagemPower =
            'https://xatimg.com/image/' +
            power.name +
            '.png';

        document.getElementById('conteudo').innerHTML = `

            <img
                src="${imagemPower}"
                class="power-img"
                alt="${power.name}"
                onerror="this.src='https://xatimg.com/image/EfoTbkB34Hg4.png';">

            <div class="power-name">
                ${power.name}
            </div>

            <div class="power-desc">
                ${power.description.long}
            </div>

            <div class="price">
                ${power.prices.store}
            </div>

            <div class="release">
                📅 ${power.released}
            </div>

            <div class="status">
                ${countdown.status}
            </div>

            <div id="contador" class="countdown">
                --
            </div>

        `;

        atualizarContador();

    }catch(e){

        document.getElementById('conteudo').innerHTML =
            'Erro ao carregar informações.';

        console.error(e);

    }

}

function atualizarContador(){

    const contador =
        document.getElementById('contador');

    if(!contador) return;

    const dias =
        Math.floor(tempoRestante / 86400);

    const horas =
        Math.floor((tempoRestante % 86400) / 3600);

    const minutos =
        Math.floor((tempoRestante % 3600) / 60);

    const segundos =
        tempoRestante % 60;

    contador.innerHTML =
        `⏳ ${dias}d ${horas}h ${minutos}m ${segundos}s`;

}

setInterval(() => {

    if(tempoRestante > 0){

        tempoRestante--;
        atualizarContador();

    }

},1000);

carregarDados();

setInterval(
    carregarDados,
    300000
);

/* Proteções básicas */

document.addEventListener(
    'contextmenu',
    e => e.preventDefault()
);

document.addEventListener(
    'selectstart',
    e => e.preventDefault()
);

document.addEventListener(
    'dragstart',
    e => e.preventDefault()
);

document.addEventListener(
    'copy',
    e => e.preventDefault()
);

document.addEventListener(
    'keydown',
    function(e){

        const key =
            e.key.toLowerCase();

        if(
            e.key === 'F12' ||
            (e.ctrlKey && key === 'u') ||
            (e.ctrlKey && key === 's') ||
            (e.ctrlKey && e.shiftKey &&
             ['i','j','c','k'].includes(key))
        ){
            e.preventDefault();
            return false;
        }

    }
);

</script>

</body>
</html>
