<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Último Power Xat</title>

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    min-height:100vh;
    font-family:Segoe UI,Arial,sans-serif;
    background:url('https://xatimg.com/image/EfoTbkB34Hg4.png') center center/cover no-repeat fixed;
    overflow:hidden;
}

.overlay{
    position:fixed;
    inset:0;
    background:rgba(0,0,0,.45);
}

.container{
    position:relative;
    z-index:2;
    min-height:100vh;

    display:flex;
    justify-content:flex-end;
    align-items:center;

    padding-right:60px;
}

.card{
    width:450px;
    padding:30px;

    background:rgba(0,0,0,.65);
    backdrop-filter:blur(10px);

    border:1px solid rgba(255,255,255,.15);

    border-radius:25px;

    color:#fff;
    text-align:center;

    box-shadow:0 15px 40px rgba(0,0,0,.4);
}

.logo{
    font-size:32px;
    font-weight:700;
    margin-bottom:10px;
}

.sub{
    opacity:.8;
    margin-bottom:25px;
}

.power-img{
    width:180px;
    height:180px;
    object-fit:contain;

    display:block;
    margin:auto;

    margin-bottom:15px;
}

.power-name{
    font-size:28px;
    font-weight:bold;
    color:#FFD700;
    margin-bottom:10px;
}

.power-desc{
    line-height:1.5;
    opacity:.9;
}

.price{
    margin-top:20px;

    background:#FFD700;
    color:#000;

    display:inline-block;

    padding:12px 25px;

    border-radius:50px;

    font-size:24px;
    font-weight:bold;
}

.loading{
    padding:20px;
}

.footer{
    margin-top:25px;
    opacity:.6;
    font-size:13px;
}

@media(max-width:768px){

    .container{
        justify-content:center;
        padding:20px;
    }

    .card{
        width:100%;
        max-width:450px;
    }

}

</style>
</head>

<body>

<div class="overlay"></div>

<div class="container">

    <div class="card">

        <div class="logo">
            BUTECO PREMIUM
        </div>

        <div class="sub">
            Último Power lançado no Xat
        </div>

        <div id="powerBox" class="loading">
            Carregando informações...
        </div>

        <div class="footer">
            Powered by xatblog API
        </div>

    </div>

</div>

<script>

async function carregarPower(){

    try{

        const response = await fetch(
            'https://api.xatblog.net/latest'
        );

        const data = await response.json();

        const imagem =
            data.image ||
            data.img ||
            data.icon ||
            data.thumb ||
            data.photo ||
            "";

        const valor =
            data.cost ||
            data.price ||
            data.value ||
            "?";

        document.getElementById("powerBox").innerHTML = `

            ${imagem ? `
            <img
                src="${imagem}"
                alt="${data.name || 'Power'}"
                class="power-img">
            ` : ''}

            <div class="power-name">
                ${data.name || 'Power Xat'}
            </div>

            <div class="power-desc">
                ${data.description || ''}
            </div>

            <div class="price">
                ${valor} xats
            </div>

        `;

    }
    catch(error){

        document.getElementById("powerBox").innerHTML = `
            <div style="color:#ff9999">
                Não foi possível carregar o último Power.
            </div>
        `;

        console.error(error);
    }

}

carregarPower();

</script>

</body>
</html>
