<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Buteco Premium - Último Power Xat</title>

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    min-height:100vh;
    display:flex;
    justify-content:flex-end;
    align-items:center;
    padding-right:50px;

    font-family:'Segoe UI',sans-serif;

    background:url('https://xatimg.com/image/EfoTbkB34Hg4.png')
    center center / cover no-repeat fixed;
}

body::before{
    content:'';
    position:fixed;
    inset:0;
    background:rgba(0,0,0,.55);
}

.card{
    position:relative;
    z-index:2;

    width:450px;

    background:rgba(0,0,0,.75);
    backdrop-filter:blur(12px);

    border-radius:20px;

    border:1px solid rgba(255,255,255,.15);

    padding:25px;

    color:#fff;

    box-shadow:0 15px 40px rgba(0,0,0,.4);
}

.title{
    text-align:center;
    color:#FFD700;
    font-size:28px;
    margin-bottom:20px;
}

.power-img{
    width:220px;
    height:220px;
    object-fit:contain;

    display:block;
    margin:auto;
}

.power-name{
    text-align:center;
    margin-top:15px;

    font-size:34px;
    font-weight:bold;

    color:#FFD700;

    text-transform:uppercase;
}

.power-desc{
    margin-top:15px;
    text-align:center;
    line-height:1.6;
}

.price{
    margin-top:20px;

    text-align:center;

    font-size:28px;
    font-weight:bold;

    color:#FFD700;
}

.release{
    margin-top:10px;
    text-align:center;
}

.status{
    margin-top:5px;
    text-align:center;

    color:#6BFF6B;
    font-weight:bold;
}

.countdown{
    margin-top:20px;

    text-align:center;

    font-size:22px;
    font-weight:bold;

    color:#00D9FF;
}

.loading{
    text-align:center;
    padding:20px;
}

.footer{
    margin-top:20px;
    text-align:center;
    opacity:.7;
    font-size:12px;
}

@media(max-width:768px){

    body{
        justify-content:center;
        padding:20px;
    }

    .card{
        width:100%;
        max-width:450px;
    }

}

</style>
</head>

<body>

<div class="card">

    <div class="title">
        🆕 Último Power Lançado
    </div>

    <div id="latestPower" class="loading">
        Carregando informações...
    </div>

    <div class="footer">
        Buteco Premium • Xat Powers
    </div>

</div>

<script>

let powerReleaseTime = 0;

function iniciarContador() {

    const contador =
    document.getElementById('countdown');

    if(!contador) return;

    function atualizar() {

        const agora =
        Math.floor(Date.now()/1000);

        const diferenca =
        powerReleaseTime - agora;

        if(diferenca <= 0){

            contador.innerHTML =
            '✅ Já lançado';

            return;
        }

        const dias =
        Math.floor(diferenca/86400);

        const horas =
        Math.floor(
            (diferenca%86400)/3600
        );

        const minutos =
        Math.floor(
            (diferenca%3600)/60
        );

        const segundos =
        diferenca%60;

        contador.innerHTML =
        `⏳ ${dias}d ${horas}h ${minutos}m ${segundos}s`;

    }

    atualizar();

    setInterval(
        atualizar,
        1000
    );

}

async function carregarLatest(){

    try{

        const resposta =
        await fetch(
            'https://api.xatblog.net/latest'
        );

        const dados =
        await resposta.json();

        const power =
        dados.powers[0];

        powerReleaseTime =
        power.released_int;

        /*
         * TROQUE ESTA URL PELO PADRÃO
         * CORRETO DAS IMAGENS DO XAT
         * CASO VOCÊ TENHA O LINK OFICIAL.
         */

        const imagem =
        `https://xatimg.com/image/${power.name}.png`;

        document.getElementById(
            'latestPower'
        ).innerHTML = `

            <img
                src="${imagem}"
                class="power-img"
                alt="${power.name}"

                onerror="
                    this.src='https://xatimg.com/image/EfoTbkB34Hg4.png';
                "
            >

            <div class="power-name">
                ${power.name}
            </div>

            <div class="power-desc">
                ${power.description.long}
            </div>

            <div class="price">
                ${power.prices.store}
            </div>

            <div class="release">
                📅 ${power.released}
            </div>

            <div class="status">
                ${power.status.toUpperCase()}
            </div>

            <div
                id="countdown"
                class="countdown">
            </div>

        `;

        iniciarContador();

    }
    catch(error){

        document.getElementById(
            'latestPower'
        ).innerHTML =
        'Erro ao carregar o último Power.';

        console.error(error);

    }

}

carregarLatest();

setInterval(
    carregarLatest,
    300000
);

</script>

</body>
</html>
