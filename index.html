<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Último Power Xat</title>

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    min-height:100vh;
    display:flex;
    justify-content:flex-end;
    align-items:center;
    padding-right:50px;

    font-family:Segoe UI,Arial,sans-serif;

    background:url('https://xatimg.com/image/EfoTbkB34Hg4.png')
    center center/cover no-repeat fixed;
}

body::before{
    content:'';
    position:fixed;
    inset:0;
    background:rgba(0,0,0,.50);
}

.card{
    position:relative;
    z-index:1;

    width:420px;

    background:rgba(0,0,0,.75);
    backdrop-filter:blur(12px);

    border:1px solid rgba(255,255,255,.15);

    border-radius:20px;

    padding:25px;

    color:white;
}

.title{
    text-align:center;
    color:#FFD700;
    margin-bottom:20px;
    font-size:28px;
}

.power-img{
    width:180px;
    height:180px;
    object-fit:contain;

    display:block;
    margin:auto;
}

.power-name{
    text-align:center;
    margin-top:15px;

    color:#FFD700;

    font-size:32px;
    font-weight:bold;

    text-transform:uppercase;
}

.power-desc{
    margin-top:15px;
    text-align:center;
    line-height:1.6;
}

.price{
    margin-top:20px;

    text-align:center;

    color:#FFD700;

    font-size:28px;
    font-weight:bold;
}

.release{
    margin-top:10px;
    text-align:center;
}

.status{
    margin-top:5px;

    text-align:center;

    color:#7CFF7C;
    font-weight:bold;
}

.loading{
    text-align:center;
    padding:20px;
}

@media(max-width:768px){

    body{
        justify-content:center;
        padding:20px;
    }

    .card{
        width:100%;
        max-width:420px;
    }

}

</style>
</head>
<body>

<div class="card">

    <div class="title">
        🆕 Último Power Lançado
    </div>

    <div id="latestPower" class="loading">
        Carregando...
    </div>

</div>

<script>

async function carregarLatest(){

    try{

        const req = await fetch(
            'https://api.xatblog.net/latest'
        );

        const data = await req.json();

        const power = data.powers[0];

        /*
         * Caso você descubra o caminho exato
         * da imagem oficial do xat,
         * substitua a URL abaixo.
         */
        const imagem =
            'https://xatimg.com/image/' +
            power.name +
            '.png';

        document.getElementById(
            'latestPower'
        ).innerHTML = `

            <img
                src="${imagem}"
                class="power-img"
                alt="${power.name}"
                onerror="
                    this.src='https://xatimg.com/image/EfoTbkB34Hg4.png';
                "
            >

            <div class="power-name">
                ${power.name}
            </div>

            <div class="power-desc">
                ${power.description.long}
            </div>

            <div class="price">
                ${power.prices.store}
            </div>

            <div class="release">
                📅 ${power.released}
            </div>

            <div class="status">
                ${power.status.toUpperCase()}
            </div>

        `;

    }
    catch(error){

        document.getElementById(
            'latestPower'
        ).innerHTML =
        'Erro ao carregar informações do Power.';

        console.error(error);
    }

}

carregarLatest();

/* Atualiza a cada 5 minutos */
setInterval(
    carregarLatest,
    300000
);

</script>

</body>
</html>
