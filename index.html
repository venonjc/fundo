<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Buteco Premium XatsFrame</title>

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    font-family:Segoe UI,Arial,sans-serif;
    min-height:100vh;
    background:url('https://xatimg.com/image/EfoTbkB34Hg4.png') center center/cover no-repeat fixed;
}

.overlay{
    position:fixed;
    inset:0;
    background:rgba(0,0,0,.50);
}

.container{
    position:relative;
    z-index:2;
    min-height:100vh;

    display:flex;
    justify-content:flex-end;
    align-items:flex-start;

    padding:20px;
}

.sidebar{
    width:450px;
    display:flex;
    flex-direction:column;
    gap:15px;
}

.box{
    background:rgba(0,0,0,.75);
    backdrop-filter:blur(10px);

    border-radius:18px;
    padding:18px;

    border:1px solid rgba(255,255,255,.10);

    color:white;
}

.box h2{
    color:#FFD700;
    margin-bottom:12px;
}

.power-name{
    font-size:28px;
    font-weight:bold;
    color:#FFD700;
    text-align:center;
}

.power-desc{
    margin-top:10px;
    line-height:1.5;
    text-align:center;
}

.price{
    margin-top:12px;
    font-size:26px;
    font-weight:bold;
    color:#FFD700;
    text-align:center;
}

.release{
    margin-top:8px;
    text-align:center;
}

.status{
    margin-top:5px;
    text-align:center;
    color:#7CFF7C;
}

.promoted-item{
    padding:10px;
    border-radius:10px;
    background:rgba(255,255,255,.08);
    margin-bottom:8px;
}

.power-card{
    padding:10px;
    border-radius:10px;
    background:rgba(255,255,255,.08);
    margin-bottom:8px;
}

input{
    width:100%;
    padding:12px;
    border:none;
    border-radius:10px;
    margin-bottom:10px;
}

button{
    width:100%;
    padding:12px;

    border:none;
    border-radius:10px;

    cursor:pointer;

    font-weight:bold;

    background:#FFD700;
}

.power-result{
    margin-top:10px;
    padding:10px;

    border-radius:10px;

    background:rgba(255,255,255,.08);
}

.loading{
    text-align:center;
    padding:10px;
}

@media(max-width:768px){

    .container{
        justify-content:center;
    }

    .sidebar{
        width:100%;
        max-width:450px;
    }

}

</style>
</head>

<body>

<div class="overlay"></div>

<div class="container">

<div class="sidebar">

    <div class="box">
        <h2>🆕 Novo Power</h2>
        <div id="latestPower" class="loading">
            Carregando...
        </div>
    </div>

    <div class="box">
        <h2>🔥 Últimos Powers</h2>
        <div id="allPowers" class="loading">
            Carregando...
        </div>
    </div>

    <div class="box">
        <h2>📢 Chats Promovidos</h2>
        <div id="promotedChats" class="loading">
            Carregando...
        </div>
    </div>

    <div class="box">
        <h2>⚡ Buscar Código de Powers</h2>

        <input
            type="text"
            id="powerCode"
            placeholder="blowkiss#y#aqbubbles">

        <button onclick="buscarPower()">
            Buscar Power
        </button>

        <div id="powerInfo"></div>

    </div>

</div>

</div>

<script>

async function carregarLatest(){

    try{

        const req =
        await fetch(
            "https://api.xatblog.net/latest"
        );

        const data =
        await req.json();

        const power =
        data.powers[0];

        document.getElementById(
            "latestPower"
        ).innerHTML = `

            <div class="power-name">
                ${power.name.toUpperCase()}
            </div>

            <div class="power-desc">
                ${power.description.long}
            </div>

            <div class="price">
                ${power.prices.store}
            </div>

            <div class="release">
                📅 ${power.released}
            </div>

            <div class="status">
                ${power.status.toUpperCase()}
            </div>

        `;

    }catch(error){

        document.getElementById(
            "latestPower"
        ).innerHTML =
        "Erro ao carregar.";

    }

}

async function carregarTodosPowers(){

    try{

        const req =
        await fetch(
            "https://api.xatblog.net/latest"
        );

        const data =
        await req.json();

        let html='';

        data.powers.forEach(power=>{

            html += `

            <div class="power-card">

                <strong>
                    ${power.name}
                </strong>

                <br>

                ${power.prices.store}

                <br>

                📅 ${power.released}

            </div>

            `;

        });

        document.getElementById(
            "allPowers"
        ).innerHTML = html;

    }catch(error){

        document.getElementById(
            "allPowers"
        ).innerHTML =
        "Erro ao carregar.";

    }

}

async function carregarPromoted(){

    try{

        const req =
        await fetch(
            "https://api.xatblog.net/promoted"
        );

        const data =
        await req.json();

        let html='';

        if(Array.isArray(data)){

            data.forEach(chat=>{

                html += `
                <div class="promoted-item">
                    ${chat.name || chat.chat || 'Chat'}
                </div>
                `;

            });

        }else{

            html = "Nenhum chat promovido.";

        }

        document.getElementById(
            "promotedChats"
        ).innerHTML = html;

    }catch(error){

        document.getElementById(
            "promotedChats"
        ).innerHTML =
        "Erro ao carregar.";

    }

}

async function buscarPower(){

    const codigo =
    document.getElementById(
        "powerCode"
    ).value.trim();

    if(!codigo) return;

    try{

        const req =
        await fetch(
            "https://api.xatblog.net/powers/findpowers?code=" +
            encodeURIComponent(codigo)
        );

        const data =
        await req.json();

        let html='';

        if(data.powers){

            data.powers.forEach(power=>{

                html += `

                <div class="power-result">

                    <strong>
                        ${power.name}
                    </strong>

                    <br>

                    ${power.description?.short || ''}

                </div>

                `;

            });

        }

        document.getElementById(
            "powerInfo"
        ).innerHTML =
        html || "Nenhum power encontrado.";

    }catch(error){

        document.getElementById(
            "powerInfo"
        ).innerHTML =
        "Erro na consulta.";

    }

}

carregarLatest();
carregarTodosPowers();
carregarPromoted();

setInterval(carregarLatest,300000);
setInterval(carregarTodosPowers,300000);
setInterval(carregarPromoted,300000);

</script>

</body>
</html>
