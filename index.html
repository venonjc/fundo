<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Buteco Premium - Último Power Xat</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    min-height:100vh;
    overflow:hidden;
    font-family:Segoe UI,Arial,sans-serif;
    background:url('https://xatimg.com/image/EfoTbkB34Hg4.png') center center/cover no-repeat fixed;
}

.overlay{
    position:absolute;
    inset:0;
    background:rgba(0,0,0,.45);
    backdrop-filter:blur(3px);
}

.mouse-light{
    position:absolute;
    width:400px;
    height:400px;
    border-radius:50%;
    pointer-events:none;
    background:radial-gradient(circle,
    rgba(255,255,255,.18) 0%,
    transparent 70%);
    transform:translate(-50%,-50%);
}

.container{
    position:relative;
    z-index:2;
    display:flex;
    justify-content:center;
    align-items:center;
    min-height:100vh;
    padding:20px;
}

.card{
    width:100%;
    max-width:700px;
    background:rgba(255,255,255,.08);
    border:1px solid rgba(255,255,255,.2);
    backdrop-filter:blur(15px);
    border-radius:25px;
    padding:40px;
    color:#fff;
    text-align:center;
    box-shadow:0 20px 40px rgba(0,0,0,.4);
    transition:.3s;
}

.card:hover{
    transform:translateY(-5px);
}

.logo{
    font-size:38px;
    font-weight:700;
    margin-bottom:10px;
}

.sub{
    opacity:.8;
    margin-bottom:30px;
}

.power{
    margin-top:20px;
}

.power h2{
    color:#ffd700;
    margin-bottom:15px;
}

.info{
    margin:15px 0;
    font-size:18px;
}

.value{
    display:inline-block;
    margin-top:20px;
    padding:12px 25px;
    background:#ffd700;
    color:#000;
    font-size:24px;
    font-weight:bold;
    border-radius:50px;
}

.loading{
    font-size:18px;
    opacity:.8;
}

.footer{
    margin-top:30px;
    opacity:.7;
    font-size:14px;
}
</style>
</head>
<body>

<div class="overlay"></div>
<div class="mouse-light" id="light"></div>

<div class="container">
    <div class="card">

        <div class="logo">
            BUTECO PREMIUM
        </div>

        <div class="sub">
            Último Power lançado no xat
        </div>

        <div id="powerBox" class="loading">
            Carregando informações...
        </div>

        <div class="footer">
            www.butecopremium.com.br
        </div>

    </div>
</div>

<script>

document.addEventListener('mousemove', e => {
    const light = document.getElementById('light');
    light.style.left = e.clientX + 'px';
    light.style.top = e.clientY + 'px';

    document.body.style.backgroundPosition =
        `${50 + (e.clientX/window.innerWidth-0.5)*3}% ${
          50 + (e.clientY/window.innerHeight-0.5)*3}%`;
});

async function carregarPower(){

    try{

        const response = await fetch(
            'https://api.xatblog.net/latest'
        );

        const data = await response.json();

        document.getElementById('powerBox').innerHTML = `
            <div class="power">
                <h2>${data.name || 'Power Xat'}</h2>

                <div class="info">
                    ${data.description || ''}
                </div>

                <div class="value">
                    ${data.cost || data.price || 'Valor indisponível'} xats
                </div>
            </div>
        `;

    }catch(error){

        document.getElementById('powerBox').innerHTML = `
            <div style="color:#ff9999">
                Não foi possível carregar o último Power.
            </div>
        `;
    }
}

carregarPower();

</script>

</body>
</html>
